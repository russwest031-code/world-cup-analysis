name: Daily prediction update

on:
  schedule:
    # Beijing afternoon refresh windows. Multiple non-round minutes reduce GitHub schedule drops/delays.
    - cron: "3 7 * * *"
    - cron: "10 7 * * *"
    - cron: "23 7 * * *"
    - cron: "41 7 * * *"
    - cron: "5 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-predictions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh model predictions
        run: npm run update:predictions
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

      - name: Commit refreshed predictions
        id: commit
        run: |
          if git diff --quiet -- data.js snapshots; then
            echo "No prediction changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js snapshots
          git commit -m "Daily prediction refresh"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Render deploy hook
        if: steps.commit.outputs.changed == 'true'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not configured; skipping Render deploy hook."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
