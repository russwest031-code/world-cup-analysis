<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07120f">
  <title>赛研 - 世界杯分析预测</title>
  <link rel="stylesheet" href="styles.css?v=8">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="赛研首页">
        <span class="brand-mark"><i></i><i></i><i></i></span>
        <span><strong>赛研</strong><small>MATCH INTELLIGENCE</small></span>
      </a>
      <button class="icon-btn" id="searchToggle" aria-label="搜索比赛">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6.5"></circle><path d="m16 16 4 4"></path></svg>
      </button>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <span class="eyebrow"><i></i> 2026 世界杯</span>
          <h1>世界杯深度分析<br><em>模型预测与数据洞察</em></h1>
          <p>基于AI模型的比分预测、胜平负概率与比赛解读，辅助观赛决策。</p>
        </div>
        <div class="hero-orbit" aria-hidden="true">
          <div class="orbit-ring"></div>
          <div class="ball"><span></span></div>
          <b>26</b>
        </div>
      </section>

      <section class="ticker" aria-label="数据状态">
        <span id="dataStatus"><i class="live-dot"></i> 正在连接竞彩</span>
        <span id="matchCount">今日 -- 场</span>
        <span id="lastUpdate">等待更新</span>
      </section>

      <div class="search-panel" id="searchPanel">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6.5"></circle><path d="m16 16 4 4"></path></svg>
        <input id="searchInput" type="search" placeholder="搜索球队，例如：巴西" autocomplete="off">
        <button id="clearSearch">清除</button>
      </div>

      <section class="date-strip" id="dateStrip" aria-label="选择比赛日期"></section>

      <section class="content-head">
        <div><span class="section-kicker">MATCHES</span><h2 id="matchHeading">今日比赛</h2></div>
      </section>

      <section class="match-list analysis-list" id="matchList"></section>
      <section class="empty-state" id="emptyState" hidden>
        <span>00</span><h3>没有找到比赛</h3><p>换个日期，或者搜索别的球队试试。</p>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="主导航">
      <a href="index.html" class="active" aria-current="page">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="2" y="18" width="4" height="4" rx="1"></rect><rect x="10" y="10" width="4" height="12" rx="1"></rect><rect x="18" y="2" width="4" height="20" rx="1"></rect></svg>
        赛前分析
      </a>
      <a href="betting.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="2" width="16" height="20" rx="2"></rect><line x1="9" y1="7" x2="15" y2="7"></line><line x1="9" y1="11" x2="15" y2="11"></line><line x1="9" y1="15" x2="12" y2="15"></line></svg>
        投注
      </a>
    </nav>
  </div>
  <script src="data.js?v=6"></script>
  <script src="sporttery.js?v=7"></script>
  <script src="app.js?v=9"></script>
</body>
</html>
